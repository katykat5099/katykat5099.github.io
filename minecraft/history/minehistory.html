<!doctype html>
<html>
  <link rel="stylesheet" href="../../assets/stylesheets/style.css" />
  <link rel="stylesheet" href="../../assets/stylesheets/alphaworld.css" />
  <style>
    .history-lists {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 32px;
    }

    .history-lists h2 {
      text-align: center;
    }

    .history-lists ul {
      margin: 0;
      padding-left: 24px;
    }

    .history-lists li {
      margin: 6px 0;
    }

    @media (max-width: 600px) {
      .history-lists {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <head>
    <title>MineHistory - Main</title>
  </head>

  <body>
    <div id="header-container"></div>
    <script src="../../common/header.js" data-root="../../"></script>
    <div class="foreground">
      <div id="minecraft-header-container"></div>
      <script src="../minecraft_navbar.js" data-minecraft-root="../"></script>
      <h1 class="projecttitle">MineHistory</h1>
      <div class="spacing">
        <hr class="divider" />
      </div>
      <div class="description">
        <h3>Welcome to Katy's archive of Minecraft History!</h3>
        <p>
          Please follow the appropriate links to find what you're looking for.
        </p>

        <div class="history-lists">
          <section>
            <h2>Minecraft Versions</h2>
            <ul id="version-list"></ul>
          </section>

          <section>
            <h2>Modded Minecraft</h2>
            <ul id="mod-list"></ul>
          </section>
        </div>
      </div>
    </div>
    <script>
      const versions = [
        { name: "Beta 1.9_pre3", href: "versions/B1.9_pre3.html" },
        { name: "Beta 1.9_pre2", href: "versions/B1.9_pre2.html" },
        { name: "Beta 1.9_pre1", href: "versions/B1.9_pre1.html" },
        { name: "Beta 1.8", href: "versions/B1.8.html" },
        { name: "Beta 1.8_pre2", href: "versions/B1.8_pre2.html" },
        { name: "Beta 1.8_pre1", href: "versions/B1.8_pre1.html" },
        { name: "Beta 1.7.2", href: "versions/B1.7.2.html" },
        { name: "Beta 1.6.6", href: "versions/B1.6.6.html" },
        { name: "Beta 1.6.1", href: "versions/B1.6.1.html" },
        { name: "Beta 1.5_02", href: "versions/B1.5_02.html" },
        { name: "Beta 1.4_01", href: "versions/B1.4_01.html" },
        { name: "Beta 1.3_01", href: "versions/B1.3_01.html" },
        { name: "Beta 1.2", href: "versions/B1.2.html" },
        { name: "Alpha 1.2.6", href: "versions/A1.2.6.html" },
        { name: "Alpha 1.1.2_01", href: "versions/A1.1.2_01.html" },
      ];

      const mods = [
        {
          name: "Battle Towers",
          href: "mods/battle_towers/battle_towers.html",
        },
        {
          name: "Equivalent Exchange",
          href: "mods/equivalent_exchange/equivalent_exchange.html",
        },
        {
          name: "IndustrialCraft 2",
          href: "mods/industrial_craft_2/industrial_craft_2.html",
        },
        {
          name: "The Aether",
          href: "mods/the_aether/the_aether.html",
        },
        {
          name: "TooManyItems",
          href: "mods/toomanyitems/toomanyitems.html",
        },
      ];

      document.getElementById("version-list").innerHTML = versions
        .map(
          (version) =>
            `<li><a href="${version.href}">${version.name}</a></li>`,
        )
        .join("");

      document.getElementById("mod-list").innerHTML = mods
        .sort((firstMod, secondMod) =>
          firstMod.name.localeCompare(secondMod.name),
        )
        .map((mod) => `<li><a href="${mod.href}">${mod.name}</a></li>`)
        .join("");
    </script>
  </body>
</html>
