<!doctype html>
<html>
  <link rel="stylesheet" href="../../assets/stylesheets/style.css" />
  <link rel="stylesheet" href="../../assets/stylesheets/alphaworld.css" />
  <style>
    .history-lists {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 32px;
    }

    .history-lists h2 {
      text-align: center;
    }

    .history-lists ul {
      margin: 0;
      padding-left: 24px;
    }

    .history-lists li {
      margin: 6px 0;
    }

    @media (max-width: 600px) {
      .history-lists {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <head>
    <title>MineHistory - Main</title>
  </head>

  <body>
    <div id="header-container"></div>
    <script src="../../common/header.js" data-root="../../"></script>
    <div class="foreground">
      <div id="minecraft-header-container"></div>
      <script src="../minecraft_navbar.js" data-minecraft-root="../"></script>
      <h1 class="projecttitle">MineHistory</h1>
      <div class="spacing">
        <hr class="divider" />
      </div>
      <div class="description">
        <h3>Welcome to Katy's archive of Minecraft History!</h3>
        <p>
          Please follow the appropriate links to find what you're looking for.
        </p>

        <div class="history-lists">
          <section>
            <h2>Minecraft Versions</h2>
            <ul id="version-list"></ul>
          </section>

          <section>
            <h2>Modded Minecraft</h2>
            <ul id="mod-list"></ul>
          </section>
        </div>
      </div>
    </div>
    <script src="history-data.js"></script>
    <script>
      const { versions, mods } = window.mineHistoryData;

      function getVersionSortParts(version) {
        const filename = version.href.split("/").pop().replace(".html", "");
        const era = filename.startsWith("B") ? 1 : 0;
        const versionText = filename.slice(1);
        const prereleaseMatch = versionText.match(/_pre(\d+)$/);
        const prerelease = prereleaseMatch ? Number(prereleaseMatch[1]) : 99;
        const normalizedVersion = versionText
          .replace(/_pre\d+$/, "")
          .replace("_", ".");
        const numberParts = normalizedVersion
          .split(".")
          .map((numberPart) => Number(numberPart));

        return [era, ...numberParts, prerelease];
      }

      function sortMinecraftVersions(firstVersion, secondVersion) {
        const firstParts = getVersionSortParts(firstVersion);
        const secondParts = getVersionSortParts(secondVersion);
        const partCount = Math.max(firstParts.length, secondParts.length);

        for (let index = 0; index < partCount; index += 1) {
          const firstPart = firstParts[index] || 0;
          const secondPart = secondParts[index] || 0;

          if (firstPart !== secondPart) {
            return secondPart - firstPart;
          }
        }

        return firstVersion.name.localeCompare(secondVersion.name);
      }

      document.getElementById("version-list").innerHTML = versions
        .slice()
        .sort(sortMinecraftVersions)
        .map(
          (version) =>
            `<li><a href="${version.href}">${version.name}</a></li>`,
        )
        .join("");

      document.getElementById("mod-list").innerHTML = mods
        .slice()
        .sort((firstMod, secondMod) =>
          firstMod.name.localeCompare(secondMod.name),
        )
        .map((mod) => `<li><a href="${mod.href}">${mod.name}</a></li>`)
        .join("");
    </script>
  </body>
</html>
